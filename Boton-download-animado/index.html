<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Boton Download</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" media="screen" href="styles.css" />
    <script src="script.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  </head>
  <body>
    <div class="contenedor--btn">
      <div class="btn-icon-downloader">
        <span class="material-symbols-outlined icon-downloader-arrow">arrow_upward</span>
        <div class="icon-downloader-canasta"></div>
      </div>
      <div class="btn--progress">
        <span class="material-symbols-outlined progress--icon">check</span>
        <div class="progress--bar"></div>
      </div>
      <div class="btn--status">
        <p class="status--title">Status</p>
        <p class="status--percentage">0%</p>
      </div>
    </div>
  </body>
</html>
